schema_version: schema_v001
config_version: mvp4b_sample_table_v001
stage: MVP-4B
task: baseline_sample_table_and_remediation

input_features: xsi_basic_features_v001
input_labels: xsi_label_samples_v001
primary_label: plus
audit_label: minus_ablation
no_model_training: true
no_final_labels: true
no_stc: true
no_apes: true

feature_names:
  - rms_energy
  - peak_abs
  - mean_abs
  - early_energy
  - late_energy
  - late_over_early_ratio

transforms:
  log1p: true
  robust_scaling: true
  clip_quantiles: [0.001, 0.999]
  per_feature_scaling: true
  optional_per_depth_normalization: true
  optional_per_side_normalization: true

sample_policy:
  use_high_confidence_for_azimuthal: true
  min_label_confidence: 0.5
  low_confidence_usage: non_azimuthal_or_excluded
  exclude_large_depth_match_error: true
  max_depth_match_error_ft: 0.5
  plus_minus_disagreement_policy: audit_flag_or_downweight

sample_weight_policy:
  policies:
    - confidence_only
    - class_balanced_confidence
    - capped_class_balanced_confidence
    - unweighted
  default_policy: capped_class_balanced_confidence
  min_label_confidence: 0.5
  max_depth_match_error_ft: 0.5
  exclude_large_depth_match_error: true
  disagreement_policy: downweight
  disagreement_weight_multiplier: 0.5
  target_candidate_weight_fraction: 0.5
  max_candidate_weight_fraction: 0.6
  capped_weight_quantile: 0.99

split:
  method: depth_block_group_split
  n_splits: 3
  depth_block_size_ft: 250.0
  min_gap_ft: 5.0
  min_samples_per_class_per_fold: 10

allowed_scope: sample_table_remediation_only
no_deep_learning: true
no_mvp4c: true
